<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FastMoney</title>
</head>
<body>

<h2>🔐 Login</h2>

<input id="user" placeholder="Usuario"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>

<button onclick="login()">Entrar</button>

<p id="msg"></p>

<hr>

<div id="dashboard" style="display:none">

  <h2>🏦 Dashboard</h2>

  <p>Usuario: <span id="welcome"></span></p>
  <p>💰 Saldo: $<span id="balance"></span></p>

  <h3>💸 Enviar dinero</h3>

  <input id="to" placeholder="Usuario destino"><br><br>
  <input id="amount" type="number" placeholder="Monto"><br><br>

  <button onclick="sendMoney()">Enviar</button>

  <p id="sendMsg"></p>

  <h3>📜 Historial</h3>
  <ul id="history"></ul>

  <br>
  <button onclick="logout()">Cerrar sesión</button>

</div>

<script>

// 🔍 verificar sesión al cargar
checkSession();

async function checkSession() {
  let res = await fetch("/session", {
    credentials: "include" // 🔥 CLAVE
  });

  let data = await res.json();

  if (data.logged) {
    showDashboard();
  }
}

async function login() {
  let res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include", // 🔥 CLAVE
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  let data = await res.json();

  if (data.success) {
    showDashboard();
  } else {
    msg.innerText = "❌ Login incorrecto";
  }
}

async function showDashboard() {
  document.getElementById("dashboard").style.display = "block";

  let res = await fetch("/dashboard", {
    credentials: "include" // 🔥 CLAVE
  });

  if (res.status === 401) {
    alert("No autorizado");
    return;
  }

  let data = await res.json();

  document.getElementById("welcome").innerText = data.username;
  document.getElementById("balance").innerText = data.balance;

  loadHistory();
}

async function sendMoney() {
  let res = await fetch("/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include", // 🔥 CLAVE
    body: JSON.stringify({
      to: to.value,
      amount: Number(amount.value)
    })
  });

  let data = await res.json();

  sendMsg.innerText = data.success
    ? "✅ Enviado"
    : "❌ " + data.message;

  showDashboard();
}

async function loadHistory() {
  let res = await fetch("/history", {
    credentials: "include" // 🔥 CLAVE
  });

  let data = await res.json();

  let list = document.getElementById("history");
  list.innerHTML = "";

  data.forEach(t => {
    let li = document.createElement("li");
    li.innerText = `${t.from_user} → ${t.to_user} : $${t.amount}`;
    list.appendChild(li);
  });
}

async function logout() {
  await fetch("/logout", {
    credentials: "include" // 🔥 CLAVE
  });

  location.reload();
}

</script>

</body>
</html>
